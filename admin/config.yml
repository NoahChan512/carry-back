backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Homepage Settings"
        name: "site"
        file: "content/site.json"
        format: "json"
        fields:
          - {label: "Brand", name: "brand", widget: "string"}
          - {label: "Tagline", name: "tagline", widget: "string"}
          - {label: "Tagline Chinese", name: "tagline_zh", widget: "string"}
          - {label: "Next Trip", name: "next_trip", widget: "string"}
          - {label: "Instagram URL", name: "instagram", widget: "string", required: false}
          - {label: "WhatsApp", name: "whatsapp", widget: "string", required: false}
          - {label: "Notice", name: "notice", widget: "text"}
          - {label: "Notice Chinese", name: "notice_zh", widget: "text"}
  - name: "products"
    label: "Products"
    files:
      - label: "Product Board"
        name: "products"
        file: "content/products.json"
        format: "json"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.id}} — {{fields.name}}"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Name Chinese", name: "name_zh", widget: "string", required: false}
              - {label: "Country", name: "country", widget: "string"}
              - {label: "Category", name: "category", widget: "string", required: false}
              - {label: "Estimated Price", name: "estimated_price", widget: "string"}
              - {label: "Service Fee", name: "service_fee", widget: "string"}
              - {label: "Status", name: "status", widget: "select", options: ["open", "limited", "closed"]}
              - {label: "Image", name: "image", widget: "image", required: false}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Description Chinese", name: "description_zh", widget: "text", required: false}
