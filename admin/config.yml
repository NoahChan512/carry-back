backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site"
    label: "Site Settings"
    files:
      - file: "content/settings.json"
        label: "Homepage Settings"
        name: "settings"
        fields:
          - {label: "Brand", name: "brand", widget: "string"}
          - {label: "Tagline", name: "tagline", widget: "string", required: false}
          - {label: "Hero", name: "hero", widget: "text"}
          - {label: "Hero Chinese", name: "heroZh", widget: "text", required: false}
          - {label: "Instagram", name: "instagram", widget: "string", required: false}
          - {label: "WhatsApp", name: "whatsapp", widget: "string", required: false}
          - {label: "Next Trip", name: "nextTrip", widget: "string"}
          - {label: "Notice", name: "notice", widget: "text"}
  - name: "products"
    label: "Products / Requests"
    files:
      - file: "content/products.json"
        label: "Product List"
        name: "products"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} — {{fields.country}}"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Product name", name: "name", widget: "string"}
              - {label: "Country", name: "country", widget: "string"}
              - {label: "Category", name: "category", widget: "string"}
              - {label: "Price note", name: "priceNote", widget: "string"}
              - {label: "Service fee", name: "fee", widget: "string"}
              - {label: "Status", name: "status", widget: "select", options: ["Open for interest", "Limited", "Closed"]}
              - {label: "Image", name: "image", widget: "image", required: false}
              - {label: "Description", name: "description", widget: "text"}
