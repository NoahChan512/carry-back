backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site"
    label: "Site Settings"
    files:
      - file: "content/settings.json"
        label: "Homepage Settings"
        name: "settings"
        fields:
          - {label: "Brand", name: "brand", widget: "string"}
          - {label: "Tagline", name: "tagline", widget: "string", required: false}
          - {label: "Hero English", name: "hero", widget: "text"}
          - {label: "Hero Chinese", name: "heroZh", widget: "text", required: false}
          - {label: "Instagram", name: "instagram", widget: "string", required: false}
          - {label: "WhatsApp", name: "whatsapp", widget: "string", required: false}
          - {label: "Next Trip English", name: "nextTrip", widget: "string"}
          - {label: "Next Trip Chinese", name: "nextTripZh", widget: "string", required: false}
          - {label: "Notice English", name: "notice", widget: "text"}
          - {label: "Notice Chinese", name: "noticeZh", widget: "text", required: false}
          - label: "Form trip / location options"
            name: "formTripOptions"
            widget: "list"
            summary: "{{fields.option}}"
            field: {label: "Option text", name: "option", widget: "string", hint: "Example: Taiwan｜台灣"}
          - {label: "Ticket stamp", name: "ticketStamp", widget: "text", required: false, hint: "Use a new line for two-line stamp, e.g. REQUEST / FIRST"}
          - {label: "Ticket title", name: "ticketTitle", widget: "string", required: false}
          - {label: "Ticket English text", name: "ticketText", widget: "text", required: false}
          - {label: "Ticket Chinese small text", name: "ticketZh", widget: "text", required: false}
          - {label: "Ticket from label", name: "ticketFromLabel", widget: "string", required: false}
          - {label: "Ticket from code", name: "ticketFromCode", widget: "string", required: false}
          - {label: "Ticket to label", name: "ticketToLabel", widget: "string", required: false}
          - {label: "Ticket to code", name: "ticketToCode", widget: "string", required: false}
          - {label: "Ticket meta 1 label", name: "ticketMeta1Label", widget: "string", required: false}
          - {label: "Ticket meta 1 value", name: "ticketMeta1Value", widget: "string", required: false}
          - {label: "Ticket meta 2 label", name: "ticketMeta2Label", widget: "string", required: false}
          - {label: "Ticket meta 2 value", name: "ticketMeta2Value", widget: "string", required: false}
          - {label: "Ticket meta 3 label", name: "ticketMeta3Label", widget: "string", required: false}
          - {label: "Ticket meta 3 value", name: "ticketMeta3Value", widget: "string", required: false}
          - {label: "Ticket stub top", name: "ticketStubTop", widget: "string", required: false}
          - {label: "Ticket stub code", name: "ticketStubCode", widget: "string", required: false}
          - {label: "Ticket stub middle", name: "ticketStubMid", widget: "text", required: false}
          - {label: "Ticket stub bottom", name: "ticketStubBottom", widget: "text", required: false}
  - name: "products"
    label: "Products / Requests"
    files:
      - file: "content/products.json"
        label: "Product List"
        name: "products"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} — {{fields.country}}"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Product name English", name: "name", widget: "string"}
              - {label: "Product name Chinese", name: "nameZh", widget: "string", required: false}
              - {label: "Country English", name: "country", widget: "string"}
              - {label: "Country Chinese", name: "countryZh", widget: "string", required: false}
              - {label: "Category English", name: "category", widget: "string"}
              - {label: "Category Chinese", name: "categoryZh", widget: "string", required: false}
              - {label: "Price note English", name: "priceNote", widget: "string"}
              - {label: "Price note Chinese", name: "priceNoteZh", widget: "string", required: false}
              - {label: "Service fee English", name: "fee", widget: "string"}
              - {label: "Service fee Chinese", name: "feeZh", widget: "string", required: false}
              - {label: "Status English", name: "status", widget: "select", options: ["Open for interest", "Limited", "Closed"]}
              - {label: "Status Chinese", name: "statusZh", widget: "string", required: false}
              - {label: "Image", name: "image", widget: "image", required: false}
              - {label: "Description English", name: "description", widget: "text"}
              - {label: "Description Chinese", name: "descriptionZh", widget: "text", required: false}
